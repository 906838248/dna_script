[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True
strict_optional = True
show_error_codes = True
pretty = True

[pydantic-mypy]
init_forbid_extra = True
init_typed = True
warn_required_dynamic_aliases = True

[mypy-pyautogui.*]
ignore_missing_imports = True

[mypy-pydirectinput.*]
ignore_missing_imports = True

[mypy-keyboard.*]
ignore_missing_imports = True

[mypy-pynput.*]
ignore_missing_imports = True

[mypy-cv2.*]
ignore_missing_imports = True
